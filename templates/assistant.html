{% extends 'base.html' %}{% block content %}<header class="top"><div><h1>AI Mental Wellness Assistant</h1><p class="muted">This assistant is not a replacement for professional medical advice.</p></div></header><section class="chat card"><div class="chat-box">{% for m in messages %}<div class="bubble {{m.sender}}">{{m.message}}</div>{% else %}<div class="bubble bot">Hi, I’m here to support you. How are you feeling today?</div>{% endfor %}</div><form method="post" class="chat-form"><input name="message" placeholder="Type a stress-related message..." required><button class="btn primary">Send</button></form></section>{% endblock %}
