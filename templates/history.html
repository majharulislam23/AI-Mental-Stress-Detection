{% extends 'base.html' %}{% block content %}<header class="top"><h1>Stress History</h1><div class="tabs"><button>Weekly</button><button>Monthly</button></div></header><section class="card"><canvas id="historyChart" data-labels='{{labels|tojson}}' data-scores='{{scores|tojson}}'></canvas></section><section class="grid two">{% for t in tests %}<a class="card result-card" href="{{url_for('result',test_id=t.id)}}"><span>{{t.created_at.strftime('%d %b %Y, %I:%M %p')}}</span><h2>{{t.score}}% · {{t.level}}</h2><p>{{t.explanation}}</p></a>{% endfor %}</section>{% endblock %}
