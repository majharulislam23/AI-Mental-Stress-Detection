{% extends 'base.html' %}{% block content %}<header class="top"><h1>Stress Detection Input</h1></header><form method="post" class="card form-wide"><label>How are you feeling today?<textarea name="feeling_text" rows="5" placeholder="Write your thoughts..."></textarea></label><label>Mood<div class="moods"><label><input type="radio" name="mood" value="great">😄 Great</label><label><input type="radio" name="mood" value="good">🙂 Good</label><label><input type="radio" name="mood" value="okay" checked>😐 Okay</label><label><input type="radio" name="mood" value="sad">😔 Sad</label><label><input type="radio" name="mood" value="anxious">😟 Anxious</label></div></label><label>Sleep quality <output id="sleepOut">5</output>/10<input type="range" min="1" max="10" value="5" name="sleep_quality" oninput="sleepOut.value=this.value"></label><label>Work/study pressure <output id="pressOut">5</output>/10<input type="range" min="1" max="10" value="5" name="pressure_level" oninput="pressOut.value=this.value"></label><label>Anxiety level <output id="anxOut">5</output>/10<input type="range" min="1" max="10" value="5" name="anxiety_level" oninput="anxOut.value=this.value"></label><button class="btn primary">Continue to Questionnaire</button></form>{% endblock %}
