{% extends 'base.html' %}{% block content %}<header class="top"><h1>Stress Questionnaire</h1></header><form method="post" class="card form-wide"><div class="progress"><span style="width:80%"></span></div>{% for q in questions %}{% set qi = loop.index0 %}<div class="question"><h3>{{loop.index}}. {{q}}</h3><div class="likert">{% for n in range(1,6) %}<label><input type="radio" name="q{{qi}}" value="{{n}}" {% if n==3 %}checked{% endif %}>{{n}}</label>{% endfor %}</div><small>1 = Strongly disagree, 5 = Strongly agree</small></div>{% endfor %}<button class="btn primary">Analyze Stress</button></form>{% endblock %}
